<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="scene">
        <div class="sky"></div>
        <div class="ground"></div>

        <div class="cube" id="cube">
            <div class="face face-front">
                <div class="content-scroll" id="content-front">
                    <header style="padding: 1rem 2rem; border-bottom: 1px solid #eee;">
                        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
                    </header>
                    <main style="padding: 2rem;">
                        {{ content }}
                    </main>
                </div>
                <div class="lighting-overlay" id="overlay-front"></div>
            </div>

            <div class="face face-right" style="visibility: hidden;">
                <div class="content-scroll" id="content-right"></div>
                <div class="lighting-overlay" id="overlay-right"></div>
            </div>
        </div>
    </div>

    <script>
        let isAnimating = false;

        document.addEventListener('click', async (e) => {
            const link = e.target.closest('a');
            if (!link || link.host !== window.location.host || isAnimating) return;
            
            e.preventDefault();
            const url = link.href;
            if (url === window.location.href) return;

            isAnimating = true;
            const cube = document.getElementById('cube');
            const contentRight = document.getElementById('content-right');
            const contentFront = document.getElementById('content-front');
            const faceRight = document.querySelector('.face-right');

            const overlayFront = document.getElementById('overlay-front');
            const overlayRight = document.getElementById('overlay-right');
            
            try {
                const response = await fetch(url);
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newTitle = doc.title;
                const newHeader = doc.querySelector('header').outerHTML;
                const newMain = doc.querySelector('main').outerHTML;
                
                contentRight.innerHTML = newHeader + newMain;
                faceRight.style.visibility = 'visible';
                
                overlayFront.style.background = 'transparent';
                overlayRight.style.background = 'rgba(0,0,0,0.8)';

                cube.style.transition = 'transform 0.5s ease-in';
                cube.style.transform = 'translateZ(-100vw) rotateY(0deg)'; 
                
                setTimeout(() => {
                    cube.style.transition = 'transform 0.8s ease-in-out';
                    cube.style.transform = 'translateZ(-100vw) rotateY(-90deg)';

                    overlayFront.style.background = 'rgba(0,0,0,0.8)';
                    overlayRight.style.background = 'transparent';
                    
                    setTimeout(() => {
                        cube.style.transition = 'transform 0.5s ease-out';
                        cube.style.transform = 'translateZ(-50vw) rotateY(-90deg)';
                        
                        setTimeout(() => {
                            cube.style.transition = 'none';
                            
                            // 临时关闭遮罩动画，瞬间应用状态，避免褪色引发闪白
                            overlayFront.style.transition = 'none';
                            overlayFront.style.background = 'transparent';
                            overlayRight.style.transition = 'none';
                            overlayRight.style.background = 'rgba(0,0,0,0.8)';
                            
                            contentFront.innerHTML = contentRight.innerHTML;
                            cube.style.transform = 'translateZ(-50vw) rotateY(0deg)';
                            
                            // 触发重绘并恢复动画
                            void overlayFront.offsetWidth;
                            overlayFront.style.transition = 'background 0.8s ease-in-out';
                            overlayRight.style.transition = 'background 0.8s ease-in-out';
                            
                            document.title = newTitle;
                            history.pushState(null, '', url);
                            
                            contentRight.innerHTML = '';
                            faceRight.style.visibility = 'hidden';
                            contentFront.scrollTop = 0;
                            
                            void cube.offsetWidth;
                            isAnimating = false;
                        }, 500);
                    }, 800);
                }, 500);
                
            } catch (error) {
                window.location.href = url;
            }
        });

        window.addEventListener('popstate', () => {
            location.reload();
        });
    </script>
</body>
</html>
